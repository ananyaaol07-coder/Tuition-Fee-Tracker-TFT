<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fee Update | TFT</title>
  <link rel="stylesheet" href="form-page.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="page-wrapper">
    <div class="form-card">
      <h1>Fee Update</h1>
      <p>Enter student payment details</p>
      <form onsubmit="savePayment(event)">
        <!-- STUDENT ID -->
        <input type="number" id="student_id" placeholder="Student ID" required />
        <!-- AMOUNT -->
        <input type="number" id="amount" placeholder="Amount Paid" required />
        <!-- PAYMENT MODE -->
        <select id="payment_mode" onchange="toggleOnlineFields()" required>
          <option value="">Select Payment Mode</option>
          <option value="Online">Online</option>
          <option value="Offline">Offline</option>
        </select>
        <!-- ONLINE FIELDS -->
        <input type="text" id="RRN_no" class="hidden" placeholder="RRN Number" />
        <input type="text" id="upi_id" class="hidden" placeholder="UPI ID" />
        <!-- DATE -->
        <input type="date" id="payment_date" required />
        <button type="submit">Update Payment</button>
      </form>
      <a href="home.html" class="back-link">← Back to Home</a>
    </div>
  </div>
  <script>
    function toggleOnlineFields() {
      const mode = document.getElementById("payment_mode").value.toLowerCase();
      const rrn = document.getElementById("RRN_no");
      const upi = document.getElementById("upi_id");
      if (mode === "online") {
        rrn.classList.remove("hidden");
        upi.classList.remove("hidden");
        rrn.required = true;
        upi.required = true;
      } else {
        rrn.classList.add("hidden");
        upi.classList.add("hidden");
        rrn.required = false;
        upi.required = false;
        rrn.value = "";
        upi.value = "";
      }
    }
    async function savePayment(event) {
      event.preventDefault();
      const data = {
        student_id: document.getElementById("student_id").value,
        amount: document.getElementById("amount").value,
        payment_mode: document.getElementById("payment_mode").value,
        RRN_no: document.getElementById("RRN_no").value,
        upi_id: document.getElementById("upi_id").value,
        payment_date: document.getElementById("payment_date").value
      };
      try {
        const res = await fetch("/add-payment", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });
        const text = await res.text();
        let result;
        try {
          result = JSON.parse(text);
        } catch {
          result = { message: text };
        }
        if (res.ok) {
          alert(result.message || "Payment added successfully");
          document.querySelector("form").reset();
          document.getElementById("RRN_no").classList.add("hidden");
          document.getElementById("upi_id").classList.add("hidden");
        } else {
          alert(result.message || "Error adding payment");
        }
      } catch (error) {
        alert("Server not responding");
        console.log(error);
      }
    }
  </script>
</body>

</html>
