<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Login | Tuition Fee Tracker</title>
    <link rel="stylesheet" href="login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div class="login-page">
        <!-- LEFT SIDE -->
        <div class="login-left">
            <div class="brand-box">
                <div class="brand-logo">TFT</div>
                <div class="brand-text">
                    <h1>Tuition Fee Tracker</h1>
                    <p>Teacher Portal</p>
                </div>
            </div>
            <span class="tag">Secure. Simple. Organized.</span>
            <h2>Welcome Back</h2>
            <p class="subtitle">
                Login to manage student fee records, track payments, and monitor pending dues from one organized
                dashboard.
            </p>
        </div>
        <!-- RIGHT SIDE -->
        <div class="login-right">
            <div class="login-card">
                <h2>Teacher Login</h2>
                <p class="login-note">Sign in with your email and password</p>
                <!-- FIXED FORM -->
                <form onsubmit="login(event)">
                    <div class="input-group">
                        <label for="username">Email</label>
                        <input type="email" id="username" placeholder="Enter your email" required />
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required />
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                </form>
                <a href="index.html" class="back-home">← Back to Home</a>
            </div>
        </div>
    </div>
    <!-- LOGIN SCRIPT -->
    <script>
        async function login(event) {
            event.preventDefault();
            let email = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();
            if (!email || !password) {
                alert("Please fill all fields!");
                return;
            }
            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    /* save logged in teacher */
                    localStorage.setItem(
                        "teacherLogin",
                        JSON.stringify(data.user)
                    );
                    window.location.href = "home.html";
                } else {
                    alert(data.message || "Invalid email or password!");
                }
            } catch (error) {
                console.log(error);
                alert("Server Error");
            }
        }
    </script>
</body>

</html>
